<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mod Store SUFRIDO_999_XIT</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}
header {
  background: #020617;
  padding: 15px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
}
.container {
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}
.card {
  background: #1e293b;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}
.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}
.card-content {
  padding: 15px;
}
.card h3 {
  margin: 0;
}
.price {
  color: #22c55e;
  font-size: 20px;
  margin: 10px 0;
}
button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: black;
  font-weight: bold;
  cursor: pointer;
}
.login {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.login-box {
  background: #1e293b;
  padding: 30px;
  border-radius: 15px;
  width: 300px;
}
input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}
.hidden {
  display: none;
}
</style>
</head>
<body>

<div id="login" class="login">
  <div class="login-box">
    <h2>Login</h2>
    <input type="text" placeholder="Usuario">
    <input type="password" placeholder="Contraseña">
    <button onclick="entrar()">Entrar</button>
  </div>
</div>

<div id="app" class="hidden">
<header>MOD MENU STORE</header>
<div class="container">

<div class="card">
  <img src="imagen1.jpg">
  <div class="card-content">
    <h3>Cuban Mods</h3>
    <div class="price">$10</div>
    <button>Comprar</button>
  </div>
</div>

<div class="card">
  <img src="imagen2.jpg">
  <div class="card-content">
    <h3>Pato Team</h3>
    <div class="price">$10</div>
    <button>Comprar</button>
  </div>
</div>

<div class="card">
  <img src="imagen3.jpg">
  <div class="card-content">
    <h3>BR Mods</h3>
    <div class="price">$10</div>
    <button>Comprar</button>
  </div>
</div>

<div class="card">
  <img src="imagen4.jpg">
  <div class="card-content">
    <h3>HG Cheats</h3>
    <div class="price">$10</div>
    <button>Comprar</button>
  </div>
</div>

<div class="card">
  <img src="imagen5.jpg">
  <div class="card-content">
    <h3>Death X Loader</h3>
    <div class="price">$10</div>
    <button>Comprar</button>
  </div>
</div>

</div>
</div>

<script>
function entrar() {
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
}
</script>

</body>
</html>
