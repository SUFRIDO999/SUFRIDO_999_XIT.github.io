<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop X</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: radial-gradient(circle at top, #001f3f, #000);
    color: white;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: rgba(0,0,0,0.8);
    box-shadow: 0 0 15px #00aaff;
}

/* PRODUCTOS */
.container {
    padding: 15px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
}

/* 🔥 CARD PRO */
.card {
    background: rgba(255,255,255,0.05);
    border-radius: 18px;
    overflow: hidden;
    text-align: center;
    border: 1px solid #00aaff40;
    box-shadow: 0 0 15px #00aaff30;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #00aaff;
}

/* 🔥 IMÁGENES GRANDES */
.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* TEXTO */
.card h4 {
    margin: 10px 0;
    text-shadow: 0 0 8px #00aaff;
}

/* BOTONES PRO */
.btn {
    background: linear-gradient(45deg, #00aaff, #005577);
    border: none;
    padding: 10px;
    border-radius: 12px;
    color: white;
    cursor: pointer;
    margin: 10px;
    box-shadow: 0 0 10px #00aaff80;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 20px #00aaff;
}

/* PANEL */
.panel {
    position: fixed;
    right: -100%;
    top: 0;
    width: 270px;
    height: 100%;
    background: #0a0a0a;
    padding: 15px;
    transition: 0.3s;
    box-shadow: -5px 0 20px #00aaff;
}

.panel.active {
    right: 0;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}

.modal-box {
    background:#111;
    padding:25px;
    border-radius:15px;
    width:90%;
    max-width:300px;
    text-align:center;
    box-shadow: 0 0 20px #00aaff;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
}

/* LISTA */
#contenido p {
    background: #111;
    padding: 8px;
    border-radius: 10px;
    margin: 5px 0;
    box-shadow: 0 0 10px #00aaff30;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h3>SHOP X</h3>
    <div>
        🛒 <span id="count">0</span>
        <button class="btn" onclick="abrirSoporte()">SOPORTE</button>
    </div>
</div>

<!-- PRODUCTOS -->
<div class="container">

    <div class="card">
        <img src="img1.jpg">
        <h4>GELO MINI (MAS DE 40 PAREDES) </h4>
        <button class="btn" onclick="abrirCarrito()">AGREGAR</button>
    </div>

    <div class="card">
        <img src="img2.jpg">
        <h4>Producto 2</h4>
        <button class="btn" onclick="abrirCarrito()">AGREGAR</button>
    </div>

    <div class="card">
        <img src="img3.jpg">
        <h4>Producto 3</h4>
        <button class="btn" onclick="abrirCarrito()">AGREGAR</button>
    </div>

    <div class="card">
        <img src="img4.jpg">
        <h4>Producto 4</h4>
        <button class="btn" onclick="abrirCarrito()">AGREGAR</button>
    </div>

    <div class="card">
        <img src="img5.jpg">
        <h4>Producto 5</h4>
        <button class="btn" onclick="abrirCarrito()">AGREGAR</button>
    </div>

    <div class="card">
        <img src="img6.jpg">
        <h4>Producto 6</h4>
        <button class="btn" onclick="abrirCarrito()">AGREGAR</button>
    </div>

    <div class="card">
        <img src="img7.jpg">
        <h4>Producto 7</h4>
        <button class="btn" onclick="abrirCarrito()">AGREGAR</button>
    </div>

</div>

<!-- PANEL -->
<div id="panel" class="panel">
    <h3>SOPORTE</h3>
    <button class="btn" onclick="cerrarPanel()">⬅ VOLVER</button>
    <div id="contenido"></div>
</div>

<!-- MODAL SOPORTE -->
<div id="modalSoporte" class="modal">
    <div class="modal-box">
        <h3>CÓDIGO APENAS PARA MODERADORES DA PÁGINA</h3>
        <input id="codigoInput" placeholder="Código">
        <button class="btn" onclick="verificarCodigo()">Entrar</button>
        <p onclick="cerrarModal('modalSoporte')" style="color:red;cursor:pointer;">Cancelar</p>
    </div>
</div>

<!-- MODAL CARRITO -->
<div id="modalCarrito" class="modal">
    <div class="modal-box">
        <h3>PON TU NÚMERO</h3>
        <input id="numeroInput" placeholder="Número">
        <button class="btn" onclick="confirmarCompra()">Agregar</button>
        <p onclick="cerrarModal('modalCarrito')" style="color:red;cursor:pointer;">Cancelar</p>
    </div>
</div>

<script>
let count = 0;
let clientes = JSON.parse(localStorage.getItem("clientes")) || [];

// CARRITO
function abrirCarrito(){
    document.getElementById("modalCarrito").style.display="flex";
}

function confirmarCompra(){
    let numero = document.getElementById("numeroInput").value.trim();

    if(numero === "") return;

    count++;
    document.getElementById("count").innerText = count;

    clientes.push(numero);
    localStorage.setItem("clientes", JSON.stringify(clientes));

    cerrarModal("modalCarrito");
    document.getElementById("numeroInput").value="";
}

// SOPORTE
function abrirSoporte(){
    document.getElementById("modalSoporte").style.display="flex";
}

function cerrarModal(id){
    document.getElementById(id).style.display="none";
}

function verificarCodigo(){
    let codigo = document.getElementById("codigoInput").value.trim();

    if(codigo === "ALEJOVIP_FF"){
        cerrarModal("modalSoporte");
        document.getElementById("panel").classList.add("active");
        mostrar();
    } else {
        alert("Código incorrecto ❌");
    }
}

function cerrarPanel(){
    document.getElementById("panel").classList.remove("active");
}

// MOSTRAR
function mostrar(){
    let cont = document.getElementById("contenido");
    cont.innerHTML = "<h4>NÚMEROS:</h4>";

    if(clientes.length === 0){
        cont.innerHTML += "<p>No hay datos aún</p>";
        return;
    }

    clientes.forEach(c=>{
        cont.innerHTML += "<p>📱 "+c+"</p>";
    });
}
</script>

</body>
</html>
